<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    
<div class="calculator">
 <input type="text" readonly id="display"> 
<div class="btn">
  <button class="grey" value="del" onclick="deleteLast()">DEL</button>
  <button class="grey" value="AC" onclick="clearDisplay()" >AC</button>
  <button class="grey" value="%" onclick="press('%')">%</button>
  <button class="yellow" value="/" onclick="press('/')">/</button>
  </div>
<div class="btn">
  <button class="black" value="7" onclick="press('7')">7</button>
  <button class="black" value="8" onclick="press('8')">8</button>
  <button class="black" value="9" onclick="press('9')">9</button>
  <button class="yellow" value="*" onclick="press('*')">*</button>
</div>
<div class="btn">
  <button class="black" value="4" onclick="press('4')">4</button>
  <button class="black" value="5" onclick="press('5')">5</button>
  <button class="black" value="6" onclick="press('6')">6</button>
<button class="yellow" value="-" onclick="press('-')">-</button>
</div>
<div class="btn">
  <button class="black" value="1" onclick="press('1')">1</button>
  <button class="black" value="2" onclick="press('2')">2</button>
  <button class="black" value="3" onclick="press('3')">3</button>
  <button class="yellow" value="+" onclick="press('+')">+</button>
</div>
<div class="btn">
  <button class="black" value="," onclick="press(',')">,</button>
  <button class="black" value="0" onclick="press('0')">0</button>
  <button class="black" value="." onclick="press('.')">.</button>
  <button class="yellow" value="=" onclick="calculate()">=</button>
</div>
</div>


<script src="calc.js"></script>


<div class="card">
   <div class="search">
     <input type="text" placeholder="enter city of choice">
     <button id="weatherbtn"><img src="images/search.png" alt=""></button>
   </div>

</div>


</body>
</html>
