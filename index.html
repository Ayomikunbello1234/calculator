<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="favicon.ico"  type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="calculator/calc.js"></script>

<h2 id="results"></h2>

<div class="calculator">
 <input type="text" readonly id="display"> 
<div class="btn">
  <button class="grey" value="del" onclick="deletelast()">DEL</button>
  <button class="grey" value="AC" id="okk" >AC</button>
  <button class="grey" value="%" onclick="press('%')">%</button>
  <button class="yellow" value="/" onclick="press('/')">/</button>
  </div>
<div class="btn">
  <button class="black" value="7" onclick="press('7')">7</button>
  <button class="black" value="8" onclick="press('8')">8</button>
  <button class="black" value="9" onclick="press('9')">9</button>
  <button class="yellow" value="*" onclick="press('*')">*</button>
</div>
<div class="btn">
  <button class="black" value="4" onclick="press('4')">4</button>
  <button class="black" value="5" onclick="press('5')">5</button>
  <button class="black" value="6" onclick="press('6')">6</button>
<button class="yellow" value="-" onclick="press('-')">-</button>
</div>
<div class="btn">
  <button class="black" value="1" onclick="press('1')">1</button>
  <button class="black" value="2" onclick="press('2')">2</button>
  <button class="black" value="3" onclick="press('3')">3</button>
  <button class="yellow" value="+" onclick="press('+')">+</button>
</div>
<div class="btn">
  <button class="black" value="," onclick="press(',')">,</button>
  <button class="black" value="0" onclick="press('0')">0</button>
  <button class="black" value="." onclick="press('.')">.</button>
  <button class="yellow" value="=" onclick="calculate()">=</button>
</div>

<p id="lastresult"></p>
</div>


<div class="card">

   <div class="search">
     <input type="text" placeholder="Enter City of Choice" id="city">
     <button id="weatherbtn" onclick="myfunction()"><img src="images/search.png" alt=""></button>
   </div>

<div class="weather">
  <img src="images/mist.png" id="weathericon" onclick="showfirst() ">
  <img src="images/drizzle.png" id="weathericon2" onclick="showsecond()">
   <h1 class="temp">22°c</h1>
   <h2 class="city" id="state">Nigeria</h2>
  <div class="about">
    <div class="col">
      <img src="images/humidity.png" alt="">
         <div>
         <p class="humidity">64%</h2>
         <p>Humidity</h3>
      </div>
    </div>

    <div class="col">
       <img src="images/wind.png" alt="">
       <div>
       <p class="wind">18km/h</h2>
       <p>Wind Speed</h3>
       </div>
    </div>
     
  </div>
</div>
</div>

<!--FOR NAME LOCAL STORAGE -->
<label for="nameInput">
<input type="text" name="nameInput" id="nameInput" placeholder="Enter your name">
</label>
<button id="savebtn">Save</button>
<h3 id="displays"></h3>
 <BR></BR>

<!-- BUTTON FOR DARK MODE, LIGHT MODE TOGGLE-->
<button id="toggle">click me</button>
<br>
<br><br> <br>

<!--COUNTER SECTION OF MY PAGE-->
<div style="margin: 0 auto; padding: 20                                                                               px;">
<button style="cursor: pointer;" id="clickcounter">Click for counter increase</button>
<br><br>
<p id="result"></p> 
<br>
<p>Click button to see counter increase</p>
<br>
<p>Even after closing the tab the counter continues</p>
</div>



<!--DRAGGING AND DROPPING ITEMS-->

<div id="div1" style="border: 2px black solid" ondragover="dragoverevent(event)" ondrop="dropevent(event)">
  <img id="dragItem" style="cursor: grab;" src="menu-item-5.png" alt="food" width="100" height="100" draggable="true" ondragstart="dragstartevent(event)">
</div>


<div id="div2" ondragover="dragoverevent(event)" ondrop="dropevent(event)"></div>


<!--saving and reseting-->
<br>
<br>
<br>
<br>
<br><br><br><br>
<div class="buttons">
<h2 id="num"></h2>
<button id="plus">+</button>
<button id="minus">-</button>
<button id="reset">Reset</button>
<button id="save">Save</button>
<button id="load">Load</button>
</div>


</body class="dark">
</html>
